# Keep Gradle within this machine's available memory.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# This is a single-module Android app; lower concurrency is more stable on 5 GB RAM.
org.gradle.parallel=false
org.gradle.workers.max=2
kotlin.incremental=false
kotlin.daemon.jvmargs=-Xmx768m

# Enable caching between builds
org.gradle.caching=true

# AndroidX support
android.useAndroidX=true
android.enableJetifier=true
